services:

  db:

    image: postgres:16

    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: taskflow_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  app:

    build: .

    container_name: fastapi_app
    restart: always
    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:admin123@db/taskflow_db
      SECRET_KEY: myultrasecretkey123


volumes:
  postgres_data: